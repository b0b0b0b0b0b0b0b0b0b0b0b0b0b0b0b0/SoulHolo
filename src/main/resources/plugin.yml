name: SoulHolo
version: '${version}'
main: bm.b0b0b0.soulHolo.SoulHolo
api-version: '1.21'
authors: [ b0b0b0 ]
depend:
  - WorldGuard
softdepend:
  - DecentHolograms
  - FancyHolograms
  - PlaceholderAPI
libraries:
  - net.elytrium:serializer:1.1.1
commands:
  dholo:
    description: Private donate holograms
    usage: /dholo <create|add|remove|edit|gui|admin>
permissions:
  soulholo.admin:
    default: op
    children:
      soulholo.gui.lines: true
      soulholo.gui.position: true
      soulholo.gui.setting.enabled: true
      soulholo.gui.setting.see-through: true
      soulholo.gui.setting.text-shadow: true
      soulholo.gui.setting.billboard: true
      soulholo.gui.setting.background: true
  soulholo.gui.lines:
    default: true
  soulholo.gui.position:
    default: true
  soulholo.gui.setting.enabled:
    default: true
  soulholo.gui.setting.see-through:
    default: true
  soulholo.gui.setting.text-shadow:
    default: true
  soulholo.gui.setting.billboard:
    default: true
  soulholo.gui.setting.background:
    default: true
  soulholo.gui.setting.scale:
    default: false
  soulholo.gui.setting.text-alignment:
    default: false
  soulholo.gui.setting.shadow:
    default: false
